<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05060f" />
    <title>ç´«éś„é›·éś†</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05060f;
        /* Prevent the browser from hijacking touch gestures (scroll/zoom). */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        touch-action: none;
      }
      /* Simple loading splash shown until Phaser boots. */
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        color: #9fe9ff;
        letter-spacing: 4px;
        background: #05060f;
        z-index: 10;
        transition: opacity 0.4s ease;
      }
      #boot-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash .title {
        font-size: 22px;
        font-weight: 700;
        text-shadow: 0 0 12px rgba(159, 233, 255, 0.6);
      }
      #boot-splash .sub {
        font-size: 11px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot-splash">
      <div class="title">ç´«éś„é›·éś†</div>
      <div class="sub">LOADINGâ€¦</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
